<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FashionLab | Exusty</title>
  <link rel="stylesheet" href="../../assets/styles/fashionlab.css">
</head>
<body>
  <header class="site-header">
    <a href="../../" class="site-logo">Exusty</a>
    <a href="../../" class="back-link">回到主页</a>
  </header>

  <main>
    <section class="lab-hero" aria-labelledby="fashionlab-title">
      <div class="hero-copy">
        <p class="eyebrow">FashionLab</p>
        <h1 id="fashionlab-title">Image Editing / Virtual Try-On</h1>
        <p class="intro">一个关于服装、身体图像和虚拟试穿的视觉实验室。</p>
      </div>
      <figure class="hero-image">
        <img src="../../assets/images/fashionlab/fashionlab-cover.png" alt="FashionLab 时尚图像实验视觉">
      </figure>
    </section>

    <section class="experiment-strip" aria-label="FashionLab 实验方向">
      <p>Image editing</p>
      <p>Virtual fitting</p>
      <p>Fashion visual study</p>
    </section>

    <section class="lab-board" aria-label="FashionLab 图像展示">
      <figure class="image-panel">
        <img src="../../assets/images/fashionlab/editor-before.png" alt="虚拟试穿前的人物图像占位视觉">
        <figcaption>Source Image</figcaption>
      </figure>

      <figure class="image-panel image-panel-large">
        <img src="../../assets/images/fashionlab/editor-after.png" alt="虚拟试穿后的服装合成占位视觉">
        <figcaption>Edited Fit</figcaption>
      </figure>
    </section>

    <section class="future-notes" aria-label="后续模块预留">
      <p>后续这里会承载试穿结果、编辑前后对比、系列图像和实验说明。</p>
    </section>
  </main>
</body>
</html>
