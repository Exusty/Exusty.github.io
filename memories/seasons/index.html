<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小谷和DJ的四季图鉴 | Exusty</title>
  <link rel="stylesheet" href="../../assets/styles/seasons.css">
</head>
<body>
  <header class="site-header">
    <a href="../../" class="site-logo">Exusty</a>
    <a href="../../" class="back-link">回到主页</a>
  </header>

  <main class="season-page">
    <h1>Dreams of Seasons</h1>

    <section class="viewer-block" aria-label="四季图鉴电子书">
      <div class="iframe-wrapper">
        <iframe
          src="https://online.fliphtml5.com/xwjvk/oxmd/"
          title="Dreams of Seasons flipbook"
          seamless="seamless"
          scrolling="no"
          frameborder="0"
          allowtransparency="true"
          allowfullscreen="true"></iframe>
      </div>
      <audio controls>
        <source src="../../assets/audio/seasons/细.mp3" type="audio/mpeg">
      </audio>
    </section>

    <section class="image-flow" aria-label="四季图鉴照片">
      <figure class="photo photo-left">
        <img src="../../assets/images/seasons/书2.jpg" alt="四季图鉴画册内页">
      </figure>

      <figure class="photo photo-left">
        <img src="../../assets/images/seasons/书.jpg" alt="四季图鉴画册封面与内页">
      </figure>

      <figure class="photo photo-right">
        <img src="../../assets/images/seasons/书3.jpg" alt="四季图鉴画册展开">
      </figure>

      <p class="memory-note note-right">
        整理了一些从去年开始一起发生并记录的碎片<br>
        通过 Zine 的形式，从照片的归档再到实体呈现出的效果，感觉像是<br>
        又过了一遍四季
      </p>

      <p class="memory-note note-left">
        ----"想做一本能刚好拿在手里的画册"<br>
        ----"想把记忆都夹进小画册"<br>
        于是<br>
        想到了打印硫酸纸
      </p>

      <figure class="photo photo-left">
        <img src="../../assets/images/seasons/liu.JPG" alt="用心排版的硫酸纸，为了省一丢丢预算">
        <figcaption>一些准备剪裁的硫酸纸</figcaption>
      </figure>

      <figure class="photo photo-left">
        <img src="../../assets/images/seasons/河流.jpg" alt="闪闪发光的水流">
        <figcaption>闪闪发光的水流</figcaption>
      </figure>

      <figure class="photo photo-right">
        <img src="../../assets/images/seasons/IMG_4720.JPG" alt="夕阳透过镀膜的封面">
        <figcaption>夕阳透过镀膜的封面</figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
